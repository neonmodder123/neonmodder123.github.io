<body>

    <script type="py">
import io
import copy
import asyncio
from fontTools.ttLib import TTFont, newTable
from fontTools.ttLib.ttCollection import TTCollection
from fontTools.ttLib.scaleUpem import scale_upem
from pyscript import document
from js import Uint8Array, File, URL, document as js_doc, fetch
from pyodide.ffi import create_proxy

status_box = document.querySelector("#status")
status_box.innerText = "Python Ready!\n"

def log(message):
    status_box.innerHTML += f"> {message}<br>"
    status_box.scrollTop = status_box.scrollHeight

def get_base_records(base):
    needed = set()
    if 'fvar' in base:
        for a in base['fvar'].axes: needed.add(a.axisNameID)
        for i in base['fvar'].instances:
            needed.add(i.subfamilyNameID)
            if i.postscriptNameID != 0xFFFF: needed.add(i.postscriptNameID)
    if 'STAT' in base:
        try:
            tbl = base['STAT'].table
            for a in tbl.DesignAxisRecord.Axis: needed.add(a.AxisNameID)
            if hasattr(tbl, 'AxisValueArray') and tbl.AxisValueArray:
                for v in tbl.AxisValueArray.AxisValue: needed.add(v.ValueNameID)
        except: pass
    recs = {}
    if 'name' in base:
        for nr in base['name'].names:
            if nr.nameID in needed:
                recs[(nr.platformID, nr.platEncID, nr.langID, nr.nameID)] = nr
    return recs

def get_face_display_name(font, index):
    if 'name' not in font:
        return f"Face {index}"
    nt = font['name']
    for nid in [4, 6, 1]:
        try:
            rec = nt.getName(nid, 3, 1, 0x0409)
            if rec:
                return rec.toUnicode()
        except Exception:
            pass
    return f"Face {index}"

def patch_face_with_source(face, src):
    saved_name = copy.deepcopy(face['name']) if 'name' in face else None
    face.setGlyphOrder(src.getGlyphOrder())

    for tag in ['glyf', 'loca', 'hmtx', 'maxp', 'head', 'hhea',
                'OS/2', 'post', 'cmap', 'prep', 'fpgm', 'cvt ',
                'gasp', 'VDMX', 'LTSH', 'hdmx']:
        if tag in src:
            face[tag] = copy.deepcopy(src[tag])

    for tag in ['GPOS', 'GSUB', 'GDEF']:
        if tag in src:
            face[tag] = copy.deepcopy(src[tag])
        elif tag in face:
            del face[tag]

    if saved_name is not None:
        face['name'] = saved_name

    for tag in ['HVAR', 'MVAR', 'VVAR']:
        if tag in face:
            del face[tag]

    if 'gvar' in face:
        del face['gvar']
    if 'fvar' in face:
        gv = newTable('gvar')
        gv.version = 1
        gv.axisCount = len(face['fvar'].axes)
        gv.sharedTuples = []
        gv.variations = {g: [] for g in face.getGlyphOrder()}
        face['gvar'] = gv

async def load_ttc_faces(event=None):
    ttc_input = document.querySelector("#ttc-file").files.item(0)
    face_selector = document.querySelector("#face-selector")
    checkboxes_div = document.querySelector("#face-checkboxes")
    note_div = document.querySelector("#face-count-note")

    if not ttc_input:
        face_selector.style.display = "none"
        return

    try:
        raw = io.BytesIO((await ttc_input.arrayBuffer()).to_py())
        col = TTCollection(raw)
        num_faces = len(col.fonts)

        checkboxes_div.innerHTML = ""
        for i, font in enumerate(col.fonts):
            name = get_face_display_name(font, i)
            safe_name = name.replace("<", "&lt;").replace(">", "&gt;")
            checkboxes_div.innerHTML += (
                f'<div class="face-row">'
                f'<input type="checkbox" class="face-cb" id="face-cb-{i}" value="{i}">'
                f'<label for="face-cb-{i}">[{i}] {safe_name}</label>'
                f'</div>'
            )

        note_div.innerText = f"{num_faces} face(s) found. Check the ones you want to patch."
        face_selector.style.display = "block"
        log(f"TTC loaded: {num_faces} face(s) found.")
    except Exception as e:
        log(f"<span class='error'>Error reading TTC: {e}</span>")
        face_selector.style.display = "none"

def _on_ttc_change(evt):
    asyncio.ensure_future(load_ttc_faces(evt))

document.querySelector("#ttc-file").addEventListener(
    "change", create_proxy(_on_ttc_change)
)

async def process_ttf(btn):
    t_input = document.querySelector("#template").files.item(0)
    s_input = document.querySelector("#source").files.item(0)

    if not s_input:
        log("<span class='error'>Error: The font file to be patched is required!</span>")
        return

    original_name = s_input.name
    if "." in original_name:
        name_parts = original_name.split(".")
        export_name = ".".join(name_parts[:-1]) + "_patched.ttf"
    else:
        export_name = original_name + "_patched.ttf"

    btn.disabled = True

    t_data = None
    if t_input:
        log("Using uploaded SFUI.")
        t_data = io.BytesIO((await t_input.arrayBuffer()).to_py())
    else:
        log("Fetching SFUI.ttf from server...")
        try:
            response = await fetch("SFUI.ttf")
            if response.ok:
                log("Found SFUI.ttf on server!")
                js_buffer = await response.arrayBuffer()
                t_data = io.BytesIO(js_buffer.to_py())
            else:
                log("<span class='error'>Error: SFUI.ttf not found on server. Please upload it manually.</span>")
                btn.disabled = False
                return
        except Exception as e:
            log("Failed to fetch from server. Please upload SFUI.ttf manually.")
            btn.disabled = False
            return

    log(f"Starting patch for {original_name}...")
    s_data = io.BytesIO((await s_input.arrayBuffer()).to_py())

    base = TTFont(t_data)
    src  = TTFont(s_data)

    target_upm  = 2048
    original_upm = src['head'].unitsPerEm
    if original_upm != target_upm:
        log(f"Patching UPM: {original_upm} → {target_upm}...")
        scale_upem(src, target_upm)
    else:
        log(f"UPM is already {target_upm}.")

    if 'glyf' not in src:
        log("<span class='error'>Error: Source font is not a valid .ttf (glyf missing!)</span>")
        btn.disabled = False
        return

    log("Merging tables...")
    dst = TTFont(t_data)
    dst.setGlyphOrder(src.getGlyphOrder())

    for t in ['glyf','loca','hmtx','maxp','head','hhea','OS/2','post','cmap','prep','fpgm','cvt ','gasp','VDMX','LTSH','hdmx']:
        if t in src: dst[t] = copy.deepcopy(src[t])

    for t in ['GPOS', 'GSUB', 'GDEF']:
        if t in src: dst[t] = copy.deepcopy(src[t])
        elif t in dst: del dst[t]

    base_records = get_base_records(base)
    if 'name' in src:
        dst['name'] = copy.deepcopy(src['name'])
        existing = set((n.platformID, n.platEncID, n.langID, n.nameID) for n in dst['name'].names)
        for k, r in base_records.items():
            if k not in existing: dst['name'].names.append(copy.copy(r))

    for t in ['HVAR', 'MVAR', 'VVAR']:
        if t in dst: del dst[t]
    if 'gvar' in dst: del dst['gvar']

    gv = newTable('gvar')
    gv.version = 1
    gv.axisCount = len(dst['fvar'].axes) if 'fvar' in dst else 0
    gv.sharedTuples = []
    gv.variations = {g: [] for g in dst.getGlyphOrder()}
    dst['gvar'] = gv

    log("Saving font...")
    out = io.BytesIO()
    dst.save(out)

    _download_bytes(out.getvalue(), export_name, "font/ttf")
    log(f"Success! Downloaded as: {export_name}")
    btn.disabled = False

async def process_ttc(btn):
    ttc_input = document.querySelector("#ttc-file").files.item(0)
    src_input = document.querySelector("#ttc-source").files.item(0)

    if not ttc_input:
        log("<span class='error'>Error: Please upload a .ttc file!</span>")
        return
    if not src_input:
        log("<span class='error'>Error: Please upload the .ttf font to be injected!</span>")
        return

    cbs = document.querySelectorAll(".face-cb:checked")
    selected_indices = []
    for i in range(cbs.length):
        selected_indices.append(int(cbs.item(i).value))

    if not selected_indices:
        log("<span class='error'>Error: Please select at least one face to patch!</span>")
        return

    btn.disabled = True

    try:
        log(f"Loading TTC: {ttc_input.name}...")
        ttc_raw  = io.BytesIO((await ttc_input.arrayBuffer()).to_py())
        src_raw  = io.BytesIO((await src_input.arrayBuffer()).to_py())

        log(f"Loading TTF to be injected: {src_input.name}...")
        src = TTFont(src_raw)

        src_upm = src['head'].unitsPerEm
        if src_upm != 2048:
            log(f"Patching UPM: {src_upm} to 2048...")
            scale_upem(src, 2048)
        else:
            log("UPM is already 2048.")

        if 'glyf' not in src:
            log("<span class='error'>Error: Source is not a valid TTF (glyf missing!)</span>")
            btn.disabled = False
            return

        log(f"Opening TTC ({ttc_input.name})...")
        col = TTCollection(ttc_raw)
        total = len(col.fonts)
        log(f"TTC has {total} face(s). Patching faces: {selected_indices}...")

        for idx in selected_indices:
            if idx >= total:
                log(f"<span class='warn'>Warning: face index {idx} out of range, skipping.</span>")
                continue
            face_name = get_face_display_name(col.fonts[idx], idx)
            log(f"Patching face [{idx}]: {face_name}...")
            patch_face_with_source(col.fonts[idx], src)

        log("Saving TTC...")
        out = io.BytesIO()
        col.save(out)

        original_name = ttc_input.name
        if "." in original_name:
            name_parts = original_name.split(".")
            export_name = ".".join(name_parts[:-1]) + "_patched.ttc"
        else:
            export_name = original_name + "_patched.ttc"
        _download_bytes(out.getvalue(), export_name, "font/ttc")
        log(f"Success! Downloaded as: {export_name}")

    except Exception as e:
        import traceback
        log(f"<span class='error'>Error: {e}</span>")
        log(traceback.format_exc().replace('\n', '<br>'))
    finally:
        btn.disabled = False

def _download_bytes(data, filename, mime):
    js_bytes = Uint8Array.new(len(data))
    js_bytes.assign(data)
    blob = File.new([js_bytes], filename, {"type": mime})
    link = js_doc.createElement("a")
    link.href = URL.createObjectURL(blob)
    link.download = filename
    js_doc.body.appendChild(link)
    link.click()
    js_doc.body.removeChild(link)

async def process(event):
    btn = document.querySelector("#run_patch")
    ttc_mode = document.querySelector("#ttc-mode").checked
    try:
        if ttc_mode:
            await process_ttc(btn)
        else:
            await process_ttf(btn)
    except Exception as e:
        log(f"<span class='error'>Unexpected error: {e}</span>")
        btn.disabled = False
    </script>

    <script>
        const themeBtn = document.getElementById("theme-toggle");
        const moonSVG = `<svg xmlns="http://www.w3.org/2000/svg" class="moon-icon" fill="currentColor" viewBox="0 0 16 16"><path d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277q.792-.001 1.533-.16a.79.79 0 0 1 .81.316.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 0 1 6 .278"/><path d="M10.794 3.148a.217.217 0 0 1 .412 0l.387 1.162c.173.518.579.924 1.097 1.097l1.162.387a.217.217 0 0 1 0 .412l-1.162.387a1.73 1.73 0 0 0-1.097 1.097l-.387 1.162a.217.217 0 0 1-.412 0l-.387-1.162A1.73 1.73 0 0 0 9.31 6.593l-1.162-.387a.217.217 0 0 1 0-.412l1.162-.387a1.73 1.73 0 0 0 1.097-1.097zM13.863.099a.145.145 0 0 1 .274 0l.258.774c.115.346.386.617.732.732l.774.258a.145.145 0 0 1 0 .274l-.774.258a1.16 1.16 0 0 0-.732.732l-.258.774a.145.145 0 0 1-.274 0l-.258-.774a1.16 1.16 0 0 0-.732-.732l-.774-.258a.145.145 0 0 1 0-.274l.774-.258c.346-.115.617-.386.732-.732z"/></svg>`;
        const sunSVG  = `<svg xmlns="http://www.w3.org/2000/svg" class="sun-icon" fill="currentColor" viewBox="0 0 16 16"><path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6m0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0m0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13m8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5M3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8m10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0m-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0m9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707M4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708"/></svg>`;

        function setMode(isDark) {
            if (isDark) {
                document.body.classList.add("dark-mode");
                themeBtn.innerHTML = sunSVG;
                localStorage.setItem("lara-patcher-theme", "dark");
            } else {
                document.body.classList.remove("dark-mode");
                themeBtn.innerHTML = moonSVG;
                localStorage.setItem("lara-patcher-theme", "light");
            }
        }

        const saved = localStorage.getItem("lara-patcher-theme");
        setMode(saved === "dark");

        themeBtn.addEventListener("click", () => {
            setMode(!document.body.classList.contains("dark-mode"));
        });

        const ttcModeCheckbox = document.getElementById("ttc-mode");
        const ttfFields = document.getElementById("ttf-fields");
        const ttcFields = document.getElementById("ttc-fields");
        const patchBtn  = document.getElementById("run_patch");

        ttcModeCheckbox.addEventListener("change", function () {
            if (this.checked) {
                ttfFields.style.display = "none";
                ttcFields.style.display = "block";
                patchBtn.textContent = "Patch TTC";
            } else {
                ttfFields.style.display = "block";
                ttcFields.style.display = "none";
                patchBtn.textContent = "Patch Font";
                document.getElementById("face-selector").style.display = "none";
            }
        });

        function selectAllFaces(checked) {
            document.querySelectorAll(".face-cb").forEach(cb => cb.checked = checked);
        }

        function respring() {
            const frame = document.getElementById('respring-iframe');
            const respringScript = `
                <html>
                <body>
                <script>
                    const container = document.createElement('div');
                    container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
                    document.body.appendChild(container);
                    for (let i = 0; i < 500; i++) {
                        let d = document.createElement('div');
                        d.style.cssText = 'position: absolute; width: 100vw; height: 100vh; backdrop-filter: blur(100px); -webkit-backdrop-filter: blur(100px); transform: translate3d(100000px, 100000px, ' + i + 'px) rotateY(90deg);';
                        container.appendChild(d);
                    }
                    setInterval(() => {
                        navigator.share({ title: 'R', text: 'R'.repeat(100000) }).catch(() => {});
                        let x = new Uint8Array(1024 * 1024 * 10);
                        crypto.getRandomValues(x);
                    }, 0);
                <\/script>
                </body>
                </html>`;
            frame.srcdoc = respringScript;
        }
    </script>

    <iframe id="respring-iframe" 
        title="respring" 
        srcdoc="" 
        sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-presentation allow-scripts">
    </iframe>

</body>
