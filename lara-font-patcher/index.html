<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS lara Font Patcher</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://fonts.cdnfonts.com/css/comic-sans-ms" rel="stylesheet">
    <style>
        body {
            font-family: "Comic Sans MS", "Comic Sans";
            line-height: 1.5;
            color: #333;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            font-size: 18px;
        }
        
        h2 {
            margin-top: 0;
            padding-bottom: 10px;
            font-weight: bold;
            border: none;
            font-size: 24px;
        }
        
        .field {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: normal;
        }
        
        input[type="file"] {
            display: block;
            width: 100%;
            font-family: inherit;
            font-size: 16px;
            padding: 5px 0;
        }
        
        button {
            padding: 15px 25px;
            cursor: pointer;
            font-family: inherit;
            background: #7b96d2;
            border: none;
            font-size: 20px;
            width: 100%;
            color: #000000;
        }
        
        #status {
            margin-top: 25px;
            padding: 15px;
            background: #f9f9f9;
            font-size: 0.85em;
            border: none;
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
            white-space: pre-wrap; 
            font-family: monospace;
        }
        
        .credits {
            margin-top: 40px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
        
        .me {
            color: #1ad2dc;
            font-weight: bold;
        }
        
        .version {
            font-size: 12px;
            color: #bbb;
            text-align: center;
            margin-top: 5px;
        }
        
        #theme-toggle {
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            position: relative;
            z-index: 100;
        }
        
        #theme-toggle:hover {
            transform: scale(1.1);
        }
        
        .sun-icon { 
            color: #FFD700 !important;
            width: 24px;
            height: 24px;
            display: block;
        }
        
        .moon-icon { 
            color: #5c5c5c !important;
            width: 24px;
            height: 24px;
            display: block;
        }
        
        body.dark-mode {
            background-color: #1a1a1a;
            color: #e0e0e0;
        }
        
        body.dark-mode #status {
            background-color: #2a2a2a;
            color: #00f3ff;
            border: 1px solid #444;
        }
        
        body.dark-mode button {
            background-color: #3a496b;
            color: #ffffff;
            border: 1px solid #265d96;
        }
        
        body.dark-mode #respring {
            background-color: #ffaa00;
            color: #ffffff;
            border: 1px solid #cc8800;
        }
        
        body.dark-mode input {
            color: #e0e0e0;
        }

        .error {
            color: #ff0000;
            font-weight: bold;
        }

        #respring {
            padding: 15px 25px;
            cursor: pointer;
            font-family: inherit;
            background: #ffaa00;
            border: none;
            font-size: 20px;
            width: 100%;
            color: #000000;
        }

        .button-container {
            display: flex;
            gap: 20px;
        }

        body.dark-mode #me {
            color: #00f3ff;
            font-weight: bold;
        }

        #respring-iframe {
            border: none;
            background: #fff;
            opacity: 0.01;
            pointer-events: none;
            height: 1px;
            width: 100%;
            position: fixed;
            bottom: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <h2 style="display: flex; align-items: center; justify-content: space-between;">
        iOS lara Font Patcher
        <span id="theme-toggle" style="cursor:pointer; width: 24px; height: 24px; color: #5c5c5c;"></span>
    </h2>

    <div class="field">
        <label for="template">[Optional]: Original SFUI.ttf file (if default .ttf doesn't work):</label>
        <input type="file" id="template" accept=".ttf">
    </div>

    <div class="field">
        <label for="source">Font file to be patched:</label>
        <input type="file" id="source" accept=".ttf">
    </div>

    <div class="button-container">
        <button id="run_patch" py-click="process">Patch Font</button>
        <button id="respring" onclick="respring()">Respring</button>
    </div>

    <div id="status">Starting Python...</div>

    <div class="credits">Made with ❤️ by <span class="me">neonmodder123</span>. Credits to jay20154068 and tabemaru for inspiration!</div>
    <div class="version">Version 0.4.1</div>

    <py-config>
        packages = ["fontTools"]
    </py-config>

    <script type="py">
import io
import copy
from fontTools.ttLib import TTFont, newTable
from pyscript import document
from js import Uint8Array, File, URL, document as js_doc, fetch
from fontTools.ttLib.scaleUpem import scale_upem

status_box = document.querySelector("#status")
status_box.innerText = "Python Ready!\n"

def log(message):
    status_box.innerHTML += f"> {message}<br>"
    status_box.scrollTop = status_box.scrollHeight

def get_base_records(base):
    needed = set()
    if 'fvar' in base:
        for a in base['fvar'].axes: needed.add(a.axisNameID)
        for i in base['fvar'].instances:
            needed.add(i.subfamilyNameID)
            if i.postscriptNameID != 0xFFFF: needed.add(i.postscriptNameID)
    if 'STAT' in base:
        try:
            tbl = base['STAT'].table
            for a in tbl.DesignAxisRecord.Axis: needed.add(a.AxisNameID)
            if hasattr(tbl, 'AxisValueArray') and tbl.AxisValueArray:
                for v in tbl.AxisValueArray.AxisValue: needed.add(v.ValueNameID)
        except: pass
    
    recs = {}
    if 'name' in base:
        for nr in base['name'].names:
            if nr.nameID in needed:
                recs[(nr.platformID, nr.platEncID, nr.langID, nr.nameID)] = nr
    return recs

async def process(event):
    btn = document.querySelector("#run_patch")
    try:
        t_input = document.querySelector("#template").files.item(0)
        s_input = document.querySelector("#source").files.item(0)
        
        if not s_input:
            log("<span class='error'>Error: The font file to be patched is required!</span>")
            return

        original_name = s_input.name
        if "." in original_name:
            name_parts = original_name.split(".")
            export_name = ".".join(name_parts[:-1]) + "_patched.ttf"
        else:
            export_name = original_name + "_patched.ttf"

        btn.disabled = True

        t_data = None
        if t_input:
            log("Using uploaded SFUI template...")
            t_data = io.BytesIO((await t_input.arrayBuffer()).to_py())
        else:
            log("Fetching SFUI.ttf from server...")
            try:
                response = await fetch("SFUI.ttf")
                if response.ok:
                    log("Found SFUI.ttf on server!")
                    js_buffer = await response.arrayBuffer()
                    t_data = io.BytesIO(js_buffer.to_py())
                else:
                    log("<span class='error'>Error: SFUI.ttf not found on server. Please upload it manually.</span>")
                    btn.disabled = False
                    return
            except Exception as e:
                log("Failed to fetch from server. Please upload SFUI.ttf manually.")
                btn.disabled = False
                return

        log(f"Starting patch for {original_name}...")
        s_data = io.BytesIO((await s_input.arrayBuffer()).to_py())

        base = TTFont(t_data)
        src = TTFont(s_data)

        target_upm = 2048
        original_upm = src['head'].unitsPerEm
        
        if original_upm != target_upm:
            log(f"Patching UPM: {original_upm} to {target_upm}...")
            scale_upem(src, target_upm)
        else:
            log(f"UPM is already {target_upm}.")

        if 'glyf' not in src:
            log("<span class='error'>Error: Source font is not a valid .ttf (glyf missing!)</span>")
            btn.disabled = False
            return

        log("Merging tables...")
        dst = TTFont(t_data)
        dst.setGlyphOrder(src.getGlyphOrder())

        for t in ['glyf','loca','hmtx','maxp','head','hhea','OS/2','post','cmap','prep','fpgm','cvt ','gasp','VDMX','LTSH','hdmx']:
            if t in src: dst[t] = copy.deepcopy(src[t])

        for t in ['GPOS', 'GSUB', 'GDEF']:
            if t in src: dst[t] = copy.deepcopy(src[t])
            elif t in dst: del dst[t]

        base_records = get_base_records(base)
        if 'name' in src:
            dst['name'] = copy.deepcopy(src['name'])
            existing = set((n.platformID, n.platEncID, n.langID, n.nameID) for n in dst['name'].names)
            for k, r in base_records.items():
                if k not in existing: dst['name'].names.append(copy.copy(r))

        for t in ['HVAR', 'MVAR', 'VVAR']:
            if t in dst: del dst[t]
        if 'gvar' in dst: del dst['gvar']
        
        gv = newTable('gvar')
        gv.version = 1
        gv.axisCount = len(dst['fvar'].axes) if 'fvar' in dst else 0
        gv.sharedTuples = []
        gv.variations = {g: [] for g in dst.getGlyphOrder()}
        dst['gvar'] = gv

        log("Saving font...")
        out = io.BytesIO()
        dst.save(out)

        js_bytes = Uint8Array.new(len(out.getvalue()))
        js_bytes.assign(out.getvalue())
        blob = File.new([js_bytes], export_name, { "type": "font/ttf" })

        link = js_doc.createElement("a")
        link.href = URL.createObjectURL(blob)
        link.download = export_name

        js_doc.body.appendChild(link)
        link.click()
        js_doc.body.removeChild(link)
        
        log(f"Success! Downloaded as: {export_name}")
    except Exception as e:
        log(f"<span class='error'>Error: {str(e)}</span>")
    finally:
        btn.disabled = False
    </script>
    <script>
        const themeBtn = document.getElementById("theme-toggle");
        const moonSVG = `<svg xmlns="http://www.w3.org/2000/svg" class="moon-icon" fill="currentColor" viewBox="0 0 16 16"><path d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277q.792-.001 1.533-.16a.79.79 0 0 1 .81.316.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 0 1 6 .278"/><path d="M10.794 3.148a.217.217 0 0 1 .412 0l.387 1.162c.173.518.579.924 1.097 1.097l1.162.387a.217.217 0 0 1 0 .412l-1.162.387a1.73 1.73 0 0 0-1.097 1.097l-.387 1.162a.217.217 0 0 1-.412 0l-.387-1.162A1.73 1.73 0 0 0 9.31 6.593l-1.162-.387a.217.217 0 0 1 0-.412l1.162-.387a1.73 1.73 0 0 0 1.097-1.097zM13.863.099a.145.145 0 0 1 .274 0l.258.774c.115.346.386.617.732.732l.774.258a.145.145 0 0 1 0 .274l-.774.258a1.16 1.16 0 0 0-.732.732l-.258.774a.145.145 0 0 1-.274 0l-.258-.774a1.16 1.16 0 0 0-.732-.732l-.774-.258a.145.145 0 0 1 0-.274l.774-.258c.346-.115.617-.386.732-.732z"/></svg>`;
        const sunSVG = `<svg xmlns="http://www.w3.org/2000/svg" class="sun-icon" fill="currentColor" viewBox="0 0 16 16"><path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6m0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0m0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13m8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5M3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8m10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0m-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0m9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707M4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708"/></svg>`;

        function setMode(isDark) {
            if (isDark) {
                document.body.classList.add("dark-mode");
                themeBtn.innerHTML = sunSVG;
                localStorage.setItem("lara-patcher-theme", "dark");
            } else {
                document.body.classList.remove("dark-mode");
                themeBtn.innerHTML = moonSVG;
                localStorage.setItem("lara-patcher-theme", "light");
            }
        }

        const saved = localStorage.getItem("lara-patcher-theme");
        setMode(saved === "dark");

        themeBtn.addEventListener("click", () => {
            setMode(!document.body.classList.contains("dark-mode"));
        });
    </script>
    <iframe id="respring-iframe" 
        title="respring" 
        srcdoc="" 
        sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-presentation allow-scripts">
    </iframe>

    <script>
        function respring() {
            const frame = document.getElementById('respring-iframe');

            const respringScript = `
                <html>
                <body>
                    <script>
                        const container = document.createElement('div');
                        container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
                        document.body.appendChild(container);

                        for (let i = 0; i < 500; i++) {
                            let d = document.createElement('div');
                            d.style.cssText = 'position: absolute; width: 100vw; height: 100vh; backdrop-filter: blur(100px); -webkit-backdrop-filter: blur(100px); transform: translate3d(100000px, 100000px, ' + i + 'px) rotateY(90deg);';
                            container.appendChild(d);
                        }

                        setInterval(() => {
                            navigator.share({ title: 'R', text: 'R'.repeat(100000) }).catch(() => {});
                            let x = new Uint8Array(1024 * 1024 * 10);
                            crypto.getRandomValues(x);
                        }, 0);
                    <\/script>
                </body>
                </html>
            `;

            frame.srcdoc = respringScript;
        }
</script>
</body>
</html>
